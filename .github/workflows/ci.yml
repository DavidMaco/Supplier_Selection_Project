name: AEGIS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 1 * *"

jobs:
  strategy-governance-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect strategy governance changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            strategy:
              - 'docs/strategy/**'
              - 'tests/test_strategy_validator.py'
              - 'tests/test_traceability_policy_drift.py'
              - '.github/workflows/ci.yml'

      - name: Set up Python
        if: steps.changes.outputs.strategy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install strategy governance dependencies
        if: steps.changes.outputs.strategy == 'true'
        run: pip install jsonschema pytest

      - name: Run strategy governance tests
        if: steps.changes.outputs.strategy == 'true'
        run: python -m pytest tests/test_strategy_validator.py tests/test_traceability_policy_drift.py -v --tb=short

      - name: Run policy drift check
        if: steps.changes.outputs.strategy == 'true'
        run: |
          python docs/strategy/check_traceability_policy_drift.py \
            --candidate docs/strategy/pip-gold-v1.candidate.json \
            --config docs/strategy/validator-config.json

      - name: Run validator quick gate
        if: steps.changes.outputs.strategy == 'true'
        run: |
          python docs/strategy/validate_pip_output.py \
            --input docs/strategy/pip-gold-v1.candidate.json \
            --schema docs/strategy/pip-gold-v1.schema.json \
            --config docs/strategy/validator-config.json > docs/strategy/ci-fast-validation.json

      - name: Enforce quick gate thresholds
        id: enforce_fast_gate
        if: steps.changes.outputs.strategy == 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("docs/strategy/ci-fast-validation.json").read_text(encoding="utf-8"))
          if not report.get("all_checks_valid", False):
              raise SystemExit("Fast governance gate failed: all_checks_valid=false")
          print("Fast governance gate passed")
          PY

      - name: Publish fast governance summary
        if: steps.changes.outputs.strategy == 'true'
        run: |
          python docs/strategy/publish_ci_summary.py \
            --title "Strategy Governance Fast Summary" \
            --triggered true \
            --path-filter-name strategy \
            --path-filter-matched "${{ steps.changes.outputs.strategy }}" \
            --path-filter-matched-count "${{ steps.changes.outputs.strategy_count }}" \
            --report docs/strategy/ci-fast-validation.json

      - name: No strategy changes
        if: steps.changes.outputs.strategy != 'true'
        run: |
          echo "No strategy governance file changes detected; skipping fast governance checks."
          python docs/strategy/publish_ci_summary.py \
            --title "Strategy Governance Fast Summary" \
            --triggered false \
            --path-filter-name strategy \
            --path-filter-matched "${{ steps.changes.outputs.strategy }}" \
            --path-filter-matched-count "${{ steps.changes.outputs.strategy_count }}" \
            --reason "no matching strategy governance paths changed"

  strategy-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install strategy validator dependency
        run: pip install jsonschema

      - name: Check traceability policy drift
        run: |
          python docs/strategy/check_traceability_policy_drift.py \
            --candidate docs/strategy/pip-gold-v1.candidate.json \
            --config docs/strategy/validator-config.json

      - name: Run strategy validator
        run: |
          python docs/strategy/validate_pip_output.py \
            --input docs/strategy/pip-gold-v1.candidate.json \
            --schema docs/strategy/pip-gold-v1.schema.json \
            --config docs/strategy/validator-config.json > docs/strategy/ci-validation.json

      - name: Validate validator output contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema

          output = json.loads(Path("docs/strategy/ci-validation.json").read_text(encoding="utf-8"))
          contract = json.loads(Path("docs/strategy/validator-output.contract.schema.json").read_text(encoding="utf-8"))
          jsonschema.Draft202012Validator(contract).validate(output)
          print("Validator output contract check passed")
          PY

      - name: Enforce all checks valid
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("docs/strategy/ci-validation.json").read_text(encoding="utf-8"))
          if not report.get("all_checks_valid", False):
              raise SystemExit("Strategy validation failed: all_checks_valid=false")
          print("Strategy validation passed: all_checks_valid=true")
          PY

      - name: Publish strategy validation summary
        run: |
          python docs/strategy/publish_ci_summary.py \
            --title "Strategy Validation Summary" \
            --triggered true \
            --report docs/strategy/ci-validation.json

  strategy-policy-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run strategy policy unit tests
        run: python -m pytest tests/test_strategy_validator.py -v --tb=short

  strategy-summary-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect summary-script changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            summary:
              - 'docs/strategy/publish_ci_summary.py'
              - 'tests/test_publish_ci_summary.py'
              - '.github/workflows/ci.yml'

      - name: Set up Python
        if: steps.changes.outputs.summary == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run summary script tests
        if: steps.changes.outputs.summary == 'true'
        run: python -m pytest tests/test_publish_ci_summary.py -v --tb=short

      - name: No summary-script changes
        if: steps.changes.outputs.summary != 'true'
        run: echo "No summary-script changes detected; skipping summary test job."

  strategy-governance-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install strategy validator dependency
        run: pip install jsonschema

      - name: Check traceability policy drift
        run: |
          python docs/strategy/check_traceability_policy_drift.py \
            --candidate docs/strategy/pip-gold-v1.candidate.json \
            --config docs/strategy/validator-config.json

      - name: Run strategy validator for governance check
        run: |
          python docs/strategy/validate_pip_output.py \
            --input docs/strategy/pip-gold-v1.candidate.json \
            --schema docs/strategy/pip-gold-v1.schema.json \
            --config docs/strategy/validator-config.json > docs/strategy/ci-scheduled-validation.json

      - name: Validate validator output contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema

          output = json.loads(Path("docs/strategy/ci-scheduled-validation.json").read_text(encoding="utf-8"))
          contract = json.loads(Path("docs/strategy/validator-output.contract.schema.json").read_text(encoding="utf-8"))
          jsonschema.Draft202012Validator(contract).validate(output)
          print("Scheduled validator output contract check passed")
          PY

      - name: Enforce monthly governance thresholds
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("docs/strategy/ci-scheduled-validation.json").read_text(encoding="utf-8"))
          if not report.get("all_checks_valid", False):
              raise SystemExit("Scheduled governance failed: all_checks_valid=false")
          warning_count = len(report.get("freshness_warnings", []))
          if warning_count > 0:
              raise SystemExit(f"Scheduled governance failed: freshness_warnings={warning_count}")
          print("Scheduled governance passed: all_checks_valid=true, freshness_warnings=0")
          PY

      - name: Publish scheduled governance summary
        run: |
          python docs/strategy/publish_ci_summary.py \
            --title "Strategy Scheduled Governance Summary" \
            --triggered true \
            --report docs/strategy/ci-scheduled-validation.json

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: aegis_procurement
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptestpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Wait for MySQL + verify DB connectivity
        run: |
          python - <<'PY'
          import time
          import pymysql

          host = "127.0.0.1"
          user = "root"
          password = "testpassword"

          last_error = None
          for _ in range(60):
              try:
                  conn = pymysql.connect(
                      host=host,
                      port=3306,
                      user=user,
                      password=password,
                      connect_timeout=3,
                      autocommit=True,
                  )
                  with conn.cursor() as cur:
                      cur.execute("CREATE DATABASE IF NOT EXISTS aegis_procurement")
                  conn.close()
                  print("MySQL is ready.")
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          else:
              raise RuntimeError(f"MySQL not ready after retries: {last_error}")
          PY

      - name: Run tests
        env:
          DATABASE_URL: "mysql+pymysql://root:testpassword@localhost:3306/aegis_procurement"
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - name: Black (check only, non-blocking)
        run: black --check --diff . || echo "::warning::black formatting issues found"
      - name: Flake8
        run: flake8 --max-line-length=120 --ignore=E501,W503,W504,E402,F401,E401,E124,E127,E128,E226,E231,E241,E301,E302,E303,E701 --exclude=__pycache__,.venv,logs .

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aegis-procurement .
      - name: Test Docker image
        run: docker run --rm -e AEGIS_FX_OFFLINE=1 aegis-procurement python -c "import config; print('OK')"
